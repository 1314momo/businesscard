<html lang="zh-CN">
<head>

    <style>
        :root {
            --bg-start: #0f0c1f;
            --bg-mid: #1a1535;
            --card-bg: rgba(25, 20, 45, 0.55);
            --card-border: rgba(255, 255, 255, 0.18);
            --text-primary: #f0eefc;
            --text-secondary: #c7c3e0;
            --text-tertiary: #9a96b8;
            --accent: #7c6ff7;
            --accent-hover: #9585ff;
            --accent-light: rgba(124, 111, 247, 0.15);
            --green: #4ade80;
            --green-light: rgba(74, 222, 128, 0.12);
            --orange: #fb923c;
            --purple: #c084fc;
            --red-soft: #fb7185;
            --shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.2);
            --shadow-xl: 0 24px 60px rgba(0, 0, 0, 0.25);
            --radius-sm: 12px;
            --radius-md: 18px;
            --radius-lg: 24px;
            --radius-xl: 30px;
            --radius-full: 9999px;
            --font-stack: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue',
                'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            --transition-fast: 0.15s cubic-bezier(0.25, 0.1, 0.25, 1);
            --transition-smooth: 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-stack);
            background: linear-gradient(145deg, #0b0821 0%, #16132e 30%, #1f1840 60%, #120d28 100%);
            background-attachment: fixed;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(90px);
            opacity: 0.5;
            will-change: transform;
            animation: orbFloat 20s ease-in-out infinite;
        }
        .bg-orb-1 {
            width: 380px;
            height: 380px;
            background: radial-gradient(circle, rgba(124, 111, 247, 0.25) 0%, rgba(124, 111, 247, 0.05) 50%, transparent 70%);
            top: -12%;
            left: -18%;
            animation-delay: 0s;
        }
        .bg-orb-2 {
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, rgba(192, 132, 252, 0.2) 0%, rgba(192, 132, 252, 0.04) 50%, transparent 70%);
            bottom: -10%;
            right: -14%;
            animation-delay: -8s;
        }
        .bg-orb-3 {
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, rgba(251, 146, 60, 0.18) 0%, rgba(251, 146, 60, 0.03) 50%, transparent 70%);
            top: 55%;
            left: 50%;
            animation-delay: -14s;
        }

        @keyframes orbFloat {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            20% {
                transform: translate(35px, -30px) scale(1.1);
            }
            40% {
                transform: translate(-20px, 25px) scale(0.92);
            }
            60% {
                transform: translate(25px, 18px) scale(1.06);
            }
            80% {
                transform: translate(-32px, -15px) scale(0.94);
            }
        }

        .card-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            animation: cardAppear 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) both;
        }

        @keyframes cardAppear {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.94);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border: 1.5px solid var(--card-border);
            border-radius: var(--radius-xl);
            padding: 32px 28px 26px;
            box-shadow: var(--shadow-xl), 0 0 0 0.5px rgba(255, 255, 255, 0.15) inset;
            position: relative;
            overflow: hidden;
            transition: transform var(--transition-smooth);
        }

        .card::before {
            content: '';
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            height: 150px;
            background: radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.12) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
            border-radius: 50%;
        }

        .card-content {
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 26px;
        }

        .avatar {
            width: 66px;
            height: 66px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6d5dfc, #c084fc, #fb923c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 650;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 8px 20px rgba(109, 93, 252, 0.35);
            position: relative;
        }
        .avatar::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            pointer-events: none;
        }

        .header-info {
            flex: 1;
            min-width: 0;
        }
        .header-info h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
            line-height: 1.2;
            margin-bottom: 4px;
        }
        .header-info .subtitle {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.1px;
        }

        .info-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 18px;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 13px 14px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all var(--transition-fast);
            cursor: default;
        }
        .info-row:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        .info-icon-wrap {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 17px;
            transition: transform var(--transition-fast);
        }
        .info-row:hover .info-icon-wrap {
            transform: scale(1.1);
        }
        .icon-phone {
            background: rgba(74, 222, 128, 0.15);
            color: #4ade80;
        }
        .icon-wechat {
            background: rgba(74, 222, 128, 0.15);
            color: #4ade80;
        }
        .icon-whatsapp {
            background: rgba(37, 211, 102, 0.15);
            color: #25d366;
        }
        .icon-xchat {
            background: rgba(192, 132, 252, 0.15);
            color: #c084fc;
        }
        .icon-tiktok {
            background: rgba(255, 64, 129, 0.15);
            color: #ff4081;
        }
        .icon-email {
            background: rgba(124, 111, 247, 0.15);
            color: #7c6ff7;
        }
        .icon-company {
            background: rgba(251, 146, 60, 0.15);
            color: #fb923c;
        }
        .icon-address {
            background: rgba(251, 113, 133, 0.15);
            color: #fb7185;
        }
        .icon-website {
            background: rgba(96, 165, 250, 0.15);
            color: #60a5fa;
        }

        .info-body {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .info-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-tertiary);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .info-value {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            letter-spacing: -0.1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
            text-decoration: none;
            display: block;
        }
        a.info-value.phone-link,
        a.info-value.web-link {
            color: var(--text-primary);
            text-decoration: none;
            cursor: pointer;
            transition: color var(--transition-fast);
        }
        a.info-value.phone-link:hover,
        a.info-value.web-link:hover {
            color: #a78bfa;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .copy-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all var(--transition-fast);
            outline: none;
            color: #c7c3e0;
        }
        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: var(--shadow-sm);
            color: #fff;
        }
        .copy-btn:active {
            transform: scale(0.9);
            background: var(--accent-light);
            border-color: rgba(124, 111, 247, 0.4);
            color: var(--accent);
        }
        .copy-btn.copied {
            background: rgba(74, 222, 128, 0.2) !important;
            border-color: rgba(74, 222, 128, 0.5) !important;
            color: var(--green) !important;
            animation: copyPop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes copyPop {
            0% {
                transform: scale(0.8);
            }
            40% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }
        .copy-btn svg {
            width: 16px;
            height: 16px;
            pointer-events: none;
        }
        .copy-btn .icon-check {
            display: none;
        }
        .copy-btn.copied .icon-copy {
            display: none;
        }
        .copy-btn.copied .icon-check {
            display: block;
            animation: checkDraw 0.3s ease forwards;
        }
        @keyframes checkDraw {
            0% {
                opacity: 0;
                transform: scale(0.5) rotate(-30deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1) 20%, rgba(255, 255, 255, 0.15) 50%, rgba(255, 255, 255, 0.1) 80%, transparent);
            margin: 6px 0 18px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }
        .btn-primary {
            flex: 1;
            padding: 14px 18px;
            border-radius: var(--radius-full);
            border: none;
            background: linear-gradient(135deg, #7c6ff7, #a78bfa);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.2px;
            cursor: pointer;
            font-family: var(--font-stack);
            transition: all var(--transition-fast);
            box-shadow: 0 6px 18px rgba(124, 111, 247, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }
        .btn-primary:hover {
            box-shadow: 0 10px 24px rgba(124, 111, 247, 0.5);
            transform: translateY(-2px);
        }
        .btn-primary:active {
            transform: scale(0.96);
            box-shadow: 0 4px 12px rgba(124, 111, 247, 0.3);
        }
        .btn-secondary {
            flex: 1;
            padding: 14px 18px;
            border-radius: var(--radius-full);
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #e0ddfa;
            font-size: 15px;
            font-weight: 560;
            letter-spacing: 0.2px;
            cursor: pointer;
            font-family: var(--font-stack);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all var(--transition-fast);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.25);
            color: #fff;
        }

        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(20, 18, 35, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            padding: 12px 24px;
            border-radius: var(--radius-full);
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .wechat-guide-mask {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .wechat-guide-mask.show {
            display: flex;
        }
        .wechat-guide-card {
            background: rgba(30, 25, 50, 0.95);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            padding: 32px 24px;
            max-width: 300px;
            text-align: center;
            box-shadow: var(--shadow-xl);
            animation: cardPop 0.3s ease;
        }
        @keyframes cardPop {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .wechat-guide-arrow {
            font-size: 48px;
            color: #60a5fa;
            margin-bottom: 12px;
            animation: bounceArrow 1.2s infinite;
        }
        @keyframes bounceArrow {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        .wechat-guide-text {
            font-size: 16px;
            font-weight: 600;
            color: #f0eefc;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .btn-close-guide {
            width: 100%;
            padding: 10px;
            border-radius: var(--radius-full);
            background: var(--accent);
            color: #fff;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font-stack);
        }

        @media (max-width: 480px) {
            .card {
                padding: 24px 18px 20px;
            }
            .avatar {
                width: 54px;
                height: 54px;
                font-size: 24px;
            }
            .header-info h1 {
                font-size: 21px;
            }
            .header-info .subtitle {
                font-size: 13px;
            }
            .info-row {
                padding: 11px 12px;
                gap: 10px;
            }
            .info-icon-wrap {
                width: 32px;
                height: 32px;
                font-size: 15px;
            }
            .info-value {
                font-size: 14px;
            }
            .copy-btn {
                width: 34px;
                height: 34px;
            }
            .btn-primary,
            .btn-secondary {
                font-size: 14px;
                padding: 12px 14px;
            }
        }
    </style>
</head>

            <button class="btn-close-guide" id="btnCloseGuide">知道啦</button>

    <script>
        (function() {
            const contactData = {
                name: '高翔',
                firstName: '翔',
                lastName: '高',
                phone: '13373556955',
                phoneDisplay: '+86 133-7355-6955',
                wechat: '13373556955',
                whatsapp: '13373556955',
                whatsappDisplay: '+86 133-7355-6955',
                xchat: 'momoxhappy',
                tiktok: 'momoxhappy@gmail.com',
                email: 'momoxhappy@gmail.com',
                company: '河北港口集团/合德海运',
                address: '河北唐山海港开发区新福林大厦8层',
                title: '销售总监',
                website: 'www.haitong.online.com',
            };

            function generateVCard() {
                return [
                    'BEGIN:VCARD','VERSION:3.0',
                    `FN:${contactData.name}`,
                    `N:${contactData.lastName};${contactData.firstName};;;`,
                    `TEL;TYPE=CELL:${contactData.phone}`,
                    `EMAIL:${contactData.email}`,
                    `ORG:${contactData.company}`,
                    `TITLE:${contactData.title}`,
                    `ADR;TYPE=WORK:;;${contactData.address};;;;`,
                    `X-WECHAT:${contactData.wechat}`,
                    `X-WHATSAPP:${contactData.whatsapp}`,
                    `X-XCHAT:${contactData.xchat}`,
                    `X-TIKTOK:${contactData.tiktok}`,
                    `URL:https://${contactData.website}`,
                    `NOTE:微信:${contactData.wechat}\\nWhatsApp:${contactData.whatsapp}\\nXChat:${contactData.xchat}\\nTikTok:${contactData.tiktok}`,
                    'END:VCARD'
                ].join('\r\n');
            }

            const vCardFull = generateVCard();

            // Toast
            const toastEl = document.getElementById('toast');
            let toastTimer;
            function showToast(msg) {
                if (toastTimer) clearTimeout(toastTimer);
                toastEl.textContent = msg;
                toastEl.classList.add('show');
                toastTimer = setTimeout(() => {
                    toastEl.classList.remove('show');
                    toastTimer = null;
                }, 1800);
            }

            // 复制功能
            function copyText(text, btn) {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(() => onCopySuccess(btn))
                        .catch(() => fallbackCopy(text, btn));
                } else {
                    fallbackCopy(text, btn);
                }
            }

            function fallbackCopy(text, btn) {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.cssText = 'position:fixed;left:-9999px;opacity:0';
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand('copy'); onCopySuccess(btn); } catch (e) { showToast('复制失败'); }
                document.body.removeChild(ta);
            }

            function onCopySuccess(btn) {
                btn.classList.add('copied');
                showToast('✓ 已复制到剪贴板');
                document.querySelectorAll('.copy-btn.copied').forEach(b => { if (b !== btn) b.classList.remove('copied'); });
                setTimeout(() => btn.classList.remove('copied'), 1600);
            }

            document.addEventListener('click', function(e) {
                const copyBtn = e.target.closest('.copy-btn');
                if (copyBtn) {
                    const text = copyBtn.getAttribute('data-copy');
                    if (text) copyText(text, copyBtn);
                    return;
                }
                const row = e.target.closest('.info-row');
                if (row && !e.target.closest('a')) {
                    const text = row.getAttribute('data-copy');
                    if (text) {
                        const btn = row.querySelector('.copy-btn');
                        copyText(text, btn);
                    }
                }
            });

            // 保存vCard
            document.getElementById('btnVCard').addEventListener('click', () => {
                const blob = new Blob([vCardFull], { type: 'text/vcard;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${contactData.name}.vcf`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('✓ vCard已保存');
            });

            // 分享逻辑
            const isWechat = /micromessenger/i.test(navigator.userAgent);
            const wechatMask = document.getElementById('wechatGuideMask');

            document.getElementById('btnShare').addEventListener('click', () => {
                if (isWechat) {
                    wechatMask.classList.add('show');
                } else {
                    const shareData = {
                        title: `${contactData.name} - 电子名片`,
                        text: `${contactData.name} | ${contactData.title} | 📞 ${contactData.phoneDisplay}`,
                        url: window.location.href,
                    };
                    if (navigator.share && (!navigator.canShare || navigator.canShare(shareData))) {
                        navigator.share(shareData).catch(() => {});
                    } else {
                        fallbackCopyShare();
                    }
                }
            });

            function fallbackCopyShare() {
                const text = `${contactData.name} - 电子名片\n${contactData.title} | ${contactData.company}\n📞 ${contactData.phoneDisplay}\n📧 ${contactData.email}\n${window.location.href}`;
                copyTextDirect(text);
                showToast('✓ 名片信息已复制，可粘贴分享');
            }

            function copyTextDirect(text) {
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(text);
                } else {
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    ta.style.cssText = 'position:fixed;left:-9999px';
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                }
            }

            document.getElementById('btnCloseGuide').addEventListener('click', () => {
                wechatMask.classList.remove('show');
            });
            wechatMask.addEventListener('click', (e) => {
                if (e.target === wechatMask) wechatMask.classList.remove('show');
            });

            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    document.getElementById('btnVCard').click();
                }
            });
        })();
    </script>
