    <style>
        :root {
            --bg-start: #f0f3f7;
            --bg-mid: #e5eaf2;
            --card-bg: rgba(255, 255, 255, 0.75);
            --card-border: rgba(0, 0, 0, 0.08);
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-tertiary: #7a7a9a;
            --accent: #5b5cd6;
            --accent-hover: #6f70e0;
            --green: #2ecc71;
            --shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 24px 60px rgba(0, 0, 0, 0.08);
            --radius-md: 18px;
            --radius-xl: 30px;
            --radius-full: 9999px;
            --font-stack: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            --transition-fast: 0.15s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-stack);
            background: linear-gradient(145deg, #f0f3f7 0%, #e5eaf2 30%, #edf1f7 60%, #e2e7f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            overflow-x: hidden;
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(90px);
            opacity: 0.4;
        }
        .bg-orb-1 { width: 380px; height: 380px; background: radial-gradient(circle, rgba(91,92,214,0.15) 0%, transparent 70%); top: -12%; left: -18%; }
        .bg-orb-2 { width: 320px; height: 320px; background: radial-gradient(circle, rgba(155,89,182,0.12) 0%, transparent 70%); bottom: -10%; right: -14%; }
        .bg-orb-3 { width: 260px; height: 260px; background: radial-gradient(circle, rgba(230,126,34,0.1) 0%, transparent 70%); top: 55%; left: 50%; }
        .bg-orb-1 { animation: floatOrb1 12s ease-in-out infinite alternate; }
        .bg-orb-2 { animation: floatOrb2 14s ease-in-out infinite alternate; }
        .bg-orb-3 { animation: floatOrb3 10s ease-in-out infinite alternate; }
        @keyframes floatOrb1 { from { transform: translate3d(0,0,0); } to { transform: translate3d(40px,24px,0); } }
        @keyframes floatOrb2 { from { transform: translate3d(0,0,0); } to { transform: translate3d(-35px,-18px,0); } }
        @keyframes floatOrb3 { from { transform: translate3d(0,0,0); } to { transform: translate3d(15px,-26px,0); } }

        .card-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            animation: cardAppear 0.8s ease;
            transition: transform 0.25s ease;
            transform-style: preserve-3d;
        }
        @keyframes cardAppear { 0% { opacity: 0; transform: translateY(30px) scale(0.94); } 100% { opacity: 1; transform: translateY(0) scale(1); } }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(30px) saturate(130%);
            -webkit-backdrop-filter: blur(30px) saturate(130%);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-xl);
            padding: 32px 28px 26px;
            box-shadow: var(--shadow-xl), 0 0 0 0.5px rgba(255,255,255,0.8) inset;
            position: relative;
            overflow: hidden;
            will-change: transform;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            height: 150px;
            background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.4) 0%, transparent 60%);
            z-index: 0;
        }
        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.35) 35%, transparent 68%);
            transform: translateX(-130%);
            animation: lightSweep 7.5s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes lightSweep {
            0%, 15% { transform: translateX(-130%); }
            50%, 100% { transform: translateX(130%); }
        }
        .card-content { position: relative; z-index: 1; }

        .lang-toggle {
            position: absolute;
            top: 16px;
            right: 20px;
            z-index: 5;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            cursor: pointer;
            transition: 0.2s;
        }
        .lang-toggle:hover { background: rgba(255,255,255,0.8); }

        .header { display: flex; align-items: center; gap: 16px; margin-bottom: 26px; margin-top: 10px; }
        .avatar {
            width: 66px;
            height: 66px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5b5cd6, #9b59b6, #e67e22);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 650;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 8px 20px rgba(91,92,214,0.25);
        }
        .header-info h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .header-info .subtitle { font-size: 14px; font-weight: 500; color: var(--text-secondary); }

        .info-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
        .info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 13px 14px;
            border-radius: var(--radius-md);
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0,0,0,0.05);
            transition: all var(--transition-fast);
            animation: rowReveal 0.7s ease backwards;
        }
        .info-row:nth-child(1) { animation-delay: 0.08s; }
        .info-row:nth-child(2) { animation-delay: 0.13s; }
        .info-row:nth-child(3) { animation-delay: 0.18s; }
        .info-row:nth-child(4) { animation-delay: 0.23s; }
        .info-row:nth-child(5) { animation-delay: 0.28s; }
        .info-row:nth-child(6) { animation-delay: 0.33s; }
        .info-row:nth-child(7) { animation-delay: 0.38s; }
        .info-row:nth-child(8) { animation-delay: 0.43s; }
        .info-row:nth-child(9) { animation-delay: 0.48s; }
        @keyframes rowReveal {
            from { opacity: 0; transform: translateY(14px) scale(0.985); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .info-row:hover { background: rgba(255,255,255,0.75); box-shadow: var(--shadow-md); transform: translateY(-1px); }

        .info-icon-wrap {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .icon-phone { background: rgba(46,204,113,0.12); color: #27ae60; }
        .icon-wechat { background: rgba(46,204,113,0.12); color: #27ae60; }
        .icon-whatsapp { background: rgba(37,211,102,0.12); color: #25d366; }
        .icon-xchat { background: rgba(155,89,182,0.12); color: #9b59b6; }
        .icon-telegram { background: rgba(0,136,204,0.12); color: #0088cc; }
        .icon-tiktok { background: rgba(233,30,99,0.12); color: #e91e63; }
        .icon-email { background: rgba(91,92,214,0.12); color: #5b5cd6; }
        .icon-company { background: rgba(230,126,34,0.12); color: #d35400; }
        .icon-address { background: rgba(231,76,60,0.12); color: #c0392b; }

        .info-body { flex: 1; min-width: 0; }
        .info-label { font-size: 11px; font-weight: 600; color: var(--text-tertiary); letter-spacing: 0.5px; text-transform: uppercase; }
        .info-value {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-decoration: none;
            display: block;
        }
        a.info-value.phone-link { color: var(--text-primary); cursor: pointer; transition: color 0.2s; }
        a.info-value.phone-link:hover { color: #5b5cd6; text-decoration: underline; }

        .copy-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.08);
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(6px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all var(--transition-fast);
            outline: none;
            color: #888;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.7); color: #333; }
        .copy-btn.copied { background: rgba(46,204,113,0.18)!important; color: #27ae60!important; }
        .copy-btn svg { width: 16px; height: 16px; }
        .copy-btn .icon-check { display: none; }
        .copy-btn.copied .icon-copy { display: none; }
        .copy-btn.copied .icon-check { display: block; }

        .action-buttons { display: flex; gap: 10px; }
        .btn-primary {
            flex: 1;
            padding: 14px 18px;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, #5b5cd6, #7f80e8);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 18px rgba(91,92,214,0.25);
        }
        .btn-primary:hover { box-shadow: 0 10px 24px rgba(91,92,214,0.35); transform: translateY(-2px); }
        .btn-secondary {
            flex: 1;
            padding: 14px 18px;
            border-radius: var(--radius-full);
            border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(6px);
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 560;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.7); }
        .btn-primary:active, .btn-secondary:active { transform: translateY(0) scale(0.98); }

        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30,30,40,0.9);
            backdrop-filter: blur(16px);
            color: #fff;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 14px;
            opacity: 0;
            transition: 0.3s;
            z-index: 100;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }

        .wechat-guide-mask {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .wechat-guide-mask.show { display: flex; }
        .wechat-guide-card {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .wechat-guide-arrow { font-size: 48px; color: #5b5cd6; margin-bottom: 12px; }
        .wechat-guide-text { font-size: 16px; font-weight: 600; margin-bottom: 20px; color: #1a1a2e; }
        .btn-close-guide {
            width: 100%;
            padding: 10px;
            border-radius: 20px;
            background: #5b5cd6;
            color: #fff;
            border: none;
            font-size: 14px;
            cursor: pointer;
        }

        @media (max-width: 480px) {
            .card { padding: 24px 18px 20px; }
            .avatar { width: 54px; height: 54px; font-size: 24px; }
            .header-info h1 { font-size: 21px; }
            .card::after { animation-duration: 9s; }
        }
    </style>
</head>

<script>
    (function() {
        const contactData = {
            name: '高翔',
            pinyin: 'Gao Xiang',
            firstName: '翔',
            lastName: '高',
            phone: '13373556955',
            wechat: '13373556955',
            whatsapp: '13373556955',
            xchat: 'momoxhappy',
            telegram: 'momoxhappy@gmail.com',
            tiktok: 'momoxhappy@gmail.com',
            email: 'momoxhappy@gmail.com',
            company: '河北港口集团/合德海运',
            companyEn: 'Hebei Port Group / Hede Shipping',
            address: '河北唐山海港开发区新福林大厦8层',
            addressEn: '8F, Xinfu Lin Building, Haigang Development Zone, Tangshan, Hebei',
            title: '',
            website: ''
        };

        const i18n = {
            zh: {
                name: '高翔',
                companySub: '河北港口集团/合德海运',
                labelPhone: '电话',
                labelWechat: '微信',
                labelWhatsapp: 'WhatsApp',
                labelXchat: 'XChat',
                labelTelegram: 'Telegram',
                labelTiktok: 'TikTok',
                labelEmail: '邮箱',
                labelCompany: '公司',
                labelAddress: '地址',
                companyValue: '河北港口集团/合德海运',
                addressValue: '河北唐山海港开发区新福林大厦8层',
                btnVCard: '保存vCard',
                btnShare: '分享名片',
                wechatGuide: '请点击右上角<br>“ ··· ”<br>选择“发送给朋友”',
                btnCloseGuide: '知道啦',
                toastCopy: '✓ 已复制到剪贴板',
                toastVCard: '✓ vCard已保存',
                toastShare: '✓ 名片信息已复制，可粘贴分享'
            },
            en: {
                name: 'Gao Xiang',
                companySub: 'Hebei Port Group / Hede Shipping',
                labelPhone: 'Phone',
                labelWechat: 'WeChat',
                labelWhatsapp: 'WhatsApp',
                labelXchat: 'XChat',
                labelTelegram: 'Telegram',
                labelTiktok: 'TikTok',
                labelEmail: 'Email',
                labelCompany: 'Company',
                labelAddress: 'Address',
                companyValue: 'Hebei Port Group / Hede Shipping',
                addressValue: '8F, Xinfu Lin Building, Haigang Development Zone, Tangshan, Hebei',
                btnVCard: 'Save vCard',
                btnShare: 'Share Card',
                wechatGuide: 'Tap the top right<br>“ ··· ”<br>and choose “Send to Chat”',
                btnCloseGuide: 'Got it',
                toastCopy: '✓ Copied to clipboard',
                toastVCard: '✓ vCard saved',
                toastShare: '✓ Card info copied, paste to share'
            }
        };

        let currentLang = 'zh';
        const cardWrapper = document.querySelector('.card-wrapper');
        const card = document.querySelector('.card');

        function switchLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (i18n[lang] && i18n[lang][key]) {
                    if (key === 'wechatGuide') {
                        el.innerHTML = i18n[lang][key];
                    } else {
                        el.textContent = i18n[lang][key];
                    }
                }
            });
            document.getElementById('langToggle').textContent = lang === 'zh' ? 'EN' : '中';
        }

        function generateVCard() {
            return [
                'BEGIN:VCARD','VERSION:3.0',
                `FN:${contactData.name}`,
                `N:${contactData.lastName};${contactData.firstName};;;`,
                `TEL;TYPE=CELL:${contactData.phone}`,
                `EMAIL:${contactData.email}`,
                `ORG:${contactData.company}`,
                `ADR;TYPE=WORK:;;${contactData.address};;;;`,
                `X-WECHAT:${contactData.wechat}`,
                `X-WHATSAPP:${contactData.whatsapp}`,
                `X-XCHAT:${contactData.xchat}`,
                `X-TELEGRAM:${contactData.telegram}`,
                `X-TIKTOK:${contactData.tiktok}`,
                'END:VCARD'
            ].join('\r\n');
        }

        const vCardFull = generateVCard();
        const toastEl = document.getElementById('toast');
        let toastTimer;

        function showToast(msg) {
            if (toastTimer) clearTimeout(toastTimer);
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            toastTimer = setTimeout(() => {
                toastEl.classList.remove('show');
                toastTimer = null;
            }, 1800);
        }

        function copyText(text, btn) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => onCopySuccess(btn)).catch(() => fallbackCopy(text, btn));
            } else {
                fallbackCopy(text, btn);
            }
        }

        function fallbackCopy(text, btn) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.cssText = 'position:fixed;left:-9999px';
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand('copy'); onCopySuccess(btn); } catch(e) { showToast('复制失败'); }
            document.body.removeChild(ta);
        }

        function onCopySuccess(btn) {
            btn.classList.add('copied');
            showToast(i18n[currentLang].toastCopy);
            setTimeout(() => btn.classList.remove('copied'), 1600);
        }

        document.addEventListener('click', function(e) {
            const copyBtn = e.target.closest('.copy-btn');
            if (copyBtn) {
                const text = copyBtn.getAttribute('data-copy');
                if (text) copyText(text, copyBtn);
                return;
            }
            const row = e.target.closest('.info-row');
            if (row && !e.target.closest('a')) {
                const text = row.getAttribute('data-copy');
                if (text) {
                    const btn = row.querySelector('.copy-btn');
                    copyText(text, btn);
                }
            }
        });

        document.getElementById('btnVCard').addEventListener('click', () => {
            const blob = new Blob([vCardFull], { type: 'text/vcard;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${contactData.name}.vcf`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            showToast(i18n[currentLang].toastVCard);
        });

        const isWechat = /micromessenger/i.test(navigator.userAgent);
        const wechatMask = document.getElementById('wechatGuideMask');

        document.getElementById('btnShare').addEventListener('click', () => {
            if (isWechat) {
                wechatMask.classList.add('show');
            } else {
                const shareData = {
                    title: `${contactData.name} · ${contactData.company}`,
                    text: `${contactData.name} | ${contactData.company} | 📞 ${contactData.phone}`,
                    url: window.location.href,
                };
                if (navigator.share && (!navigator.canShare || navigator.canShare(shareData))) {
                    navigator.share(shareData).catch(() => {});
                } else {
                    const shareText = `${contactData.name} · ${contactData.company}\n📞 ${contactData.phone}\n📧 ${contactData.email}\n${window.location.href}`;
                    if (navigator.clipboard) {
                        navigator.clipboard.writeText(shareText);
                    } else {
                        const ta = document.createElement('textarea');
                        ta.value = shareText;
                        ta.style.cssText = 'position:fixed;left:-9999px';
                        document.body.appendChild(ta);
                        ta.select();
                        document.execCommand('copy');
                        document.body.removeChild(ta);
                    }
                    showToast(i18n[currentLang].toastShare);
                }
            }
        });

        document.getElementById('btnCloseGuide').addEventListener('click', () => wechatMask.classList.remove('show'));
        wechatMask.addEventListener('click', (e) => {
            if (e.target === wechatMask) wechatMask.classList.remove('show');
        });

        document.getElementById('langToggle').addEventListener('click', () => {
            const newLang = currentLang === 'zh' ? 'en' : 'zh';
            switchLanguage(newLang);
        });

        document.addEventListener('pointermove', (e) => {
            if (!cardWrapper || window.matchMedia('(max-width: 768px)').matches) return;
            const rect = cardWrapper.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            const rotateY = (x - 0.5) * 8;
            const rotateX = (0.5 - y) * 8;
            cardWrapper.style.transform = `perspective(1000px) rotateX(${rotateX.toFixed(2)}deg) rotateY(${rotateY.toFixed(2)}deg)`;
            if (card) {
                card.style.boxShadow = `${-rotateY * 1.2}px ${18 + rotateX * 1.1}px 52px rgba(90,110,150,0.2), 0 0 0 0.5px rgba(255,255,255,0.8) inset`;
            }
        });

        document.addEventListener('pointerleave', () => {
            if (!cardWrapper) return;
            cardWrapper.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
            if (card) card.style.boxShadow = 'var(--shadow-xl), 0 0 0 0.5px rgba(255,255,255,0.8) inset';
        });

        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                document.getElementById('btnVCard').click();
            }
        });
    })();
</script>
</body>
</html>
